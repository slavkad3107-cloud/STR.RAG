# Это НЕ исчерпывающий и НЕ юридически выверенный реестр — стартовый набор,
# который пользователь дополняет под свою практику. Назначение: подсветить
# заведомо отменённые/заменённые документы и явные опечатки в номерах.
#
# Формат записи:
#   - id: каноничный номер
#     title: название
