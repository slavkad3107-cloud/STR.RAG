# Справочник классов опасности отходов и типовых формулировок.
# Классы опасности (по ФЗ-89): I-V (или 1-5).
waste_class_words: ["класс опасности", "класса опасности", "класс опасн"]
# Нормализация класса -> римская форма
class_map:
  "1": "I"
  "2": "II"
  "3": "III"
  "4": "IV"
  "5": "V"
# ФККО: код из 11 цифр (детектируется регулярным выражением в коде).
notes: "Коды ФККО — 11 цифр; паспорта отходов — отдельные документы ИЭИ/ПОС."
